name: personal_dashboard
description: Personal finance dashboard – Flutter port of PWA.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.4
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3+2
  path: ^1.9.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  share_plus: ^9.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
